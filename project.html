  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--green:#699966;--green-light:rgba(105,153,102,0.15);--bg:#1c1c1c;--card:#212121;--text:#d1d5db;--muted:#9ca3af;--white:#fff;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Anton',sans-serif;overflow-x:hidden;}

    /* ── NAV ── */
    header{position:fixed;top:0;left:0;right:0;z-index:200;height:65px;background:rgba(28,28,28,.9);border-bottom:1px solid rgba(58,90,58,.25);backdrop-filter:blur(12px);display:flex;align-items:center;padding:0 60px;}
    nav{width:100%;display:flex;align-items:center;justify-content:space-between;}
    .logo{color:var(--green);font-size:20px;letter-spacing:1px;text-decoration:none;}
    .nav-links{display:flex;align-items:center;gap:28px;list-style:none;}
    .nav-links a{color:var(--white);text-decoration:none;font-size:14px;letter-spacing:.5px;transition:color .2s;}
    .nav-links a:hover{color:var(--green);}
    .nav-links .btn-contact{background:var(--green);color:var(--white);padding:6px 18px;border-radius:5px;transition:opacity .2s;}
    .nav-links .btn-contact:hover{opacity:.85;}

    /* ── BREADCRUMB ── */
    .breadcrumb{padding:90px 60px 0;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);letter-spacing:.5px;}
    .breadcrumb a{color:var(--muted);text-decoration:none;transition:color .2s;}
    .breadcrumb a:hover{color:var(--green);}
    .breadcrumb span{color:var(--green);}

    /* ── PROJECT HEADER ── */
    .project-header{padding:24px 60px 40px;}
    .project-cat{font-size:12px;letter-spacing:2px;color:var(--green);margin-bottom:10px;}
    .project-title{font-size:clamp(32px,5vw,64px);color:var(--white);line-height:1;letter-spacing:-1px;margin-bottom:16px;}
    .project-meta{display:flex;gap:24px;flex-wrap:wrap;align-items:center;}
    .meta-pill{background:var(--green-light);border:1px solid rgba(105,153,102,.25);border-radius:100px;padding:5px 14px;font-size:12px;letter-spacing:1px;color:var(--muted);}
    .meta-pill span{color:var(--white);}

    /* ── MAIN LAYOUT ── */
    .project-body{display:grid;grid-template-columns:1fr 340px;gap:40px;padding:0 60px 80px;align-items:start;}

    /* ── GALLERY ── */
    .gallery-col{}

    /* Main viewer */
    .gallery-main{border-radius:16px;overflow:hidden;background:rgba(58,90,58,.15);border:1px solid rgba(58,90,58,.2);position:relative;margin-bottom:12px;min-height:360px;display:flex;align-items:center;justify-content:center;}
    .gallery-main img{width:100%;display:block;border-radius:16px;object-fit:contain;max-height:600px;}
    .gallery-main video{width:100%;border-radius:16px;max-height:600px;background:#000;}
    .gallery-main iframe.pdf-frame{width:100%;height:520px;border:none;border-radius:16px;}
    .gallery-main .gif-wrap img{width:100%;border-radius:16px;}

    /* nav arrows on main viewer */
    .gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:none;color:var(--white);width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:5;}
    .gallery-arrow:hover{background:var(--green);}
    .gallery-arrow.prev{left:12px;}
    .gallery-arrow.next{right:12px;}
    .gallery-counter{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);border-radius:100px;padding:4px 14px;font-size:12px;letter-spacing:1px;color:var(--white);}

    /* Thumbnail strip */
    .gallery-thumbs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
    .gallery-thumbs::-webkit-scrollbar{height:4px;}
    .gallery-thumbs::-webkit-scrollbar-thumb{background:rgba(105,153,102,.3);border-radius:2px;}
    .thumb{flex-shrink:0;width:72px;height:60px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s,opacity .2s;opacity:.6;background:rgba(58,90,58,.2);display:flex;align-items:center;justify-content:center;position:relative;}
    .thumb.active{border-color:var(--green);opacity:1;}
    .thumb:hover{opacity:.9;}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .thumb .thumb-icon{font-size:22px;line-height:1;}
    .thumb .thumb-type{position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,.7);border-radius:3px;font-size:8px;padding:1px 4px;color:var(--white);letter-spacing:.5px;}

    /* ── SIDEBAR ── */
    .sidebar-col{display:flex;flex-direction:column;gap:28px;}

    .sidebar-card{background:var(--card);border:1px solid rgba(58,90,58,.2);border-radius:16px;padding:24px;}
    .sidebar-card h3{font-size:13px;letter-spacing:2px;color:var(--green);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(58,90,58,.2);}

    /* Description */
    .project-desc{font-size:15px;line-height:1.8;color:var(--text);font-family:'Anton',sans-serif;letter-spacing:.3px;}
    .project-role{margin-top:14px;font-size:13px;color:var(--muted);}
    .project-role strong{color:var(--green);}

    /* Tools */
    .tools-grid{display:flex;flex-wrap:wrap;gap:8px;}
    .tool-tag{background:rgba(58,90,58,.25);border:1px solid rgba(105,153,102,.2);border-radius:8px;padding:6px 12px;font-size:12px;letter-spacing:.5px;color:var(--white);}

    /* Credits */
    .credit-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(58,90,58,.12);}
    .credit-item:last-child{border-bottom:none;padding-bottom:0;}
    .credit-avatar{width:38px;height:38px;border-radius:50%;background:rgba(105,153,102,.2);border:1px solid rgba(105,153,102,.3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;}
    .credit-avatar img{width:100%;height:100%;object-fit:cover;}
    .credit-info{flex:1;min-width:0;}
    .credit-name{color:var(--white);font-size:14px;margin-bottom:2px;}
    .credit-role{color:var(--muted);font-size:11px;letter-spacing:.5px;}
    .credit-link{color:var(--green);font-size:11px;text-decoration:none;margin-top:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .credit-link:hover{text-decoration:underline;}

    /* ── PREV / NEXT PROJECT NAV ── */
    .project-nav{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 60px 80px;}
    .proj-nav-btn{background:var(--card);border:1px solid rgba(58,90,58,.2);border-radius:14px;padding:20px 24px;text-decoration:none;transition:border-color .25s,transform .25s;display:block;}
    .proj-nav-btn:hover{border-color:var(--green);transform:translateY(-3px);}
    .proj-nav-label{font-size:11px;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;}
    .proj-nav-title{font-size:16px;color:var(--white);}
    .proj-nav-btn.next-btn{text-align:right;}
    .proj-nav-btn.prev-btn .proj-nav-label::before{content:'← ';}
    .proj-nav-btn.next-btn .proj-nav-label::after{content:' →';}

    /* ── NOT FOUND ── */
    .not-found{text-align:center;padding:160px 40px;color:var(--muted);}
    .not-found h2{font-size:48px;color:var(--white);margin-bottom:16px;}
    .not-found a{color:var(--green);text-decoration:none;}

    /* ── FOOTER ── */
    footer{background:rgba(58,90,58,.2);border-top:1px solid rgba(58,90,58,.3);padding:40px 60px;}
    .footer-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
    .footer-logo{color:var(--green);font-size:20px;text-decoration:none;}
    .social-links{display:flex;gap:20px;}
    .social-links a{color:var(--muted);transition:color .2s,transform .2s;display:flex;align-items:center;}
    .social-links a:hover{color:var(--green);transform:translateY(-2px);}
    .footer-divider{border:none;border-top:1px solid rgba(58,90,58,.2);margin-bottom:24px;}
    .footer-copy{text-align:center;color:var(--muted);font-size:14px;}
    .footer-copy a{color:var(--green);text-decoration:none;}

    /* ── RESPONSIVE ── */
    @media(max-width:1000px){
      .project-body{grid-template-columns:1fr;}
      .project-nav{grid-template-columns:1fr;}
    }
    @media(max-width:600px){
      header{padding:0 20px;}
      .nav-links{display:none;}
      .breadcrumb,.project-header,.project-body,.project-nav{padding-left:20px;padding-right:20px;}
      footer{padding:32px 20px;}
    }
  </style>

// ═══════════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════════
const projectIds = PROJECTS.map(p => p.id);
const id         = new URLSearchParams(window.location.search).get('id');
const idx        = projectIds.indexOf(id);
const project    = PROJECTS[idx];

if (!project) {
  // Not found
  document.getElementById('pageContent').innerHTML = `
    <div class="not-found">
      <h2>PROJECT NOT FOUND</h2>
      <p>This project doesn't exist or the link is broken.</p>
      <br/><a href="portfolio.html">← Back to Portfolio</a>
    </div>`;
} else {

  document.title = project.title + ' | Mayamba Maxwell';

  // ── Build gallery HTML ──
  let currentMedia = 0;

  function mediaViewerHTML(item, i) {
    const active = i === 0 ? 'style="display:flex"' : 'style="display:none"';
    if (item.type === 'image' || item.type === 'gif') {
      return `<div class="media-slide" data-idx="${i}" ${active}><img src="${item.url}" alt="${item.caption||''}" loading="lazy"/></div>`;
    }
    if (item.type === 'video') {
      return `<div class="media-slide" data-idx="${i}" ${active}><video src="${item.url}" controls preload="metadata" poster=""></video></div>`;
    }
    if (item.type === 'youtube') {
      return `<div class="media-slide" data-idx="${i}" ${active}><iframe class="pdf-frame" src="${item.url}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
    }
    if (item.type === 'pdf') {
      return `<div class="media-slide" data-idx="${i}" ${active}><iframe class="pdf-frame" src="${item.url}"></iframe></div>`;
    }
    return '';
  }

  function thumbHTML(item, i) {
    const icons = { image:'🖼', video:'🎬', youtube:'▶', gif:'🎞', pdf:'📄' };
    const typeLabel = item.type.toUpperCase();
    if (item.type === 'image' || item.type === 'gif') {
      return `<div class="thumb${i===0?' active':''}" data-idx="${i}"><img src="${item.url}" alt=""/><span class="thumb-type">${typeLabel}</span></div>`;
    }
    return `<div class="thumb${i===0?' active':''}" data-idx="${i}"><span class="thumb-icon">${icons[item.type]||'📁'}</span><span class="thumb-type">${typeLabel}</span></div>`;
  }

  // ── Tools ──
  const toolsHTML = project.tools.map(t => `<span class="tool-tag">${t}</span>`).join('');

  // ── Credits ──
  const creditsHTML = project.credits.map(c => `
    <div class="credit-item">
      <div class="credit-avatar">${c.avatar && c.avatar.startsWith('http') ? `<img src="${c.avatar}" alt="${c.name}"/>` : c.avatar}</div>
      <div class="credit-info">
        <div class="credit-name">${c.name}</div>
        <div class="credit-role">${c.role}</div>
        ${c.link ? `<a class="credit-link" href="${c.link}" target="_blank">${c.link.replace('https://','')}</a>` : ''}
      </div>
    </div>`).join('');

  // ── Prev / Next ──
  const prevProject = idx > 0 ? PROJECTS[idx - 1] : null;
  const nextProject = idx < PROJECTS.length - 1 ? PROJECTS[idx + 1] : null;
  const prevHTML = prevProject
    ? `<a class="proj-nav-btn prev-btn" href="project.html?id=${prevProject.id}"><div class="proj-nav-label">PREVIOUS PROJECT</div><div class="proj-nav-title">${prevProject.title}</div></a>`
    : `<div></div>`;
  const nextHTML = nextProject
    ? `<a class="proj-nav-btn next-btn" href="project.html?id=${nextProject.id}"><div class="proj-nav-label">NEXT PROJECT</div><div class="proj-nav-title">${nextProject.title}</div></a>`
    : `<div></div>`;

  // ── Inject everything ──
  document.getElementById('pageContent').innerHTML = `
    <div class="breadcrumb">
      <a href="portfolio.html">PORTFOLIO</a>
      <span>/</span>
      <span>${project.category}</span>
      <span>/</span>
      <span>${project.title}</span>
    </div>

    <div class="project-header">
      <div class="project-cat">${project.category}</div>
      <h1 class="project-title">${project.title}</h1>
      <div class="project-meta">
        <div class="meta-pill">YEAR <span>${project.year}</span></div>
        <div class="meta-pill">DURATION <span>${project.duration}</span></div>
        <div class="meta-pill">ROLE <span>${project.myRole.split('—')[0].trim()}</span></div>
      </div>
    </div>

    <div class="project-body">

      <!-- GALLERY -->
      <div class="gallery-col">
        <div class="gallery-main" id="galleryMain">
          ${project.gallery.map((item, i) => mediaViewerHTML(item, i)).join('')}
          ${project.gallery.length > 1 ? `
            <button class="gallery-arrow prev" id="galleryPrev">&#8592;</button>
            <button class="gallery-arrow next" id="galleryNext">&#8594;</button>
            <div class="gallery-counter"><span id="galleryCur">1</span> / ${project.gallery.length}</div>
          ` : ''}
        </div>
        ${project.gallery.length > 1 ? `
          <div class="gallery-thumbs" id="galleryThumbs">
            ${project.gallery.map((item, i) => thumbHTML(item, i)).join('')}
          </div>
        ` : ''}
        ${project.gallery[0]?.caption ? `<p style="font-size:13px;color:var(--muted);margin-top:10px;letter-spacing:.5px" id="galleryCaption">${project.gallery[0].caption}</p>` : ''}
      </div>

      <!-- SIDEBAR -->
      <div class="sidebar-col">

        <div class="sidebar-card">
          <h3>ABOUT THIS PROJECT</h3>
          <p class="project-desc">${project.description}</p>
          <p class="project-role"><strong>MY ROLE:</strong> ${project.myRole}</p>
        </div>

        <div class="sidebar-card">
          <h3>TOOLS & TECH</h3>
          <div class="tools-grid">${toolsHTML}</div>
        </div>

        <div class="sidebar-card">
          <h3>CREDITS</h3>
          ${creditsHTML}
        </div>

      </div>
    </div>

    <!-- PREV / NEXT NAV -->
    <div class="project-nav">
      ${prevHTML}
      ${nextHTML}
    </div>
  `;

  // ── Gallery interactivity ──
  if (project.gallery.length > 1) {
    const slides   = document.querySelectorAll('.media-slide');
    const thumbs   = document.querySelectorAll('.thumb');
    const caption  = document.getElementById('galleryCaption');
    const curLabel = document.getElementById('galleryCur');

    function goTo(n) {
      slides[currentMedia].style.display = 'none';
      thumbs[currentMedia].classList.remove('active');
      currentMedia = (n + slides.length) % slides.length;
      slides[currentMedia].style.display = 'flex';
      thumbs[currentMedia].classList.add('active');
      thumbs[currentMedia].scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
      if (curLabel) curLabel.textContent = currentMedia + 1;
      if (caption)  caption.textContent  = project.gallery[currentMedia].caption || '';
    }

    document.getElementById('galleryPrev').addEventListener('click', () => goTo(currentMedia - 1));
    document.getElementById('galleryNext').addEventListener('click', () => goTo(currentMedia + 1));
    thumbs.forEach((thumb, i) => thumb.addEventListener('click', () => goTo(i)));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  goTo(currentMedia - 1);
      if (e.key === 'ArrowRight') goTo(currentMedia + 1);
    });
  }
}
</script>
